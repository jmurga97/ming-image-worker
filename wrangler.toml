name = "ming-image-worker"
main = "src/index.ts"
compatibility_date = "2026-05-03"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true
workers_dev = false

[images]
binding = "IMAGES"

[[d1_databases]]
binding = "DB"
database_name = "ming-image-worker-production"
database_id = "846bcac4-ea73-4a17-b29e-f1d3766ce957"
migrations_dir = "src/db/migrations"

[[r2_buckets]]
binding = "RONCALPHOTO_ORIGINALS_BUCKET"
bucket_name = "roncalphoto-originals"

[[r2_buckets]]
binding = "RONCALPHOTO_MEDIA_BUCKET"
bucket_name = "roncalphoto-media"

[[queues.producers]]
binding = "IMAGE_PROCESSING_QUEUE"
queue = "ming-image-processing-production"

[[queues.consumers]]
queue = "ming-image-processing-production"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 3
retry_delay = 30
dead_letter_queue = "ming-image-processing-dlq-production"

[[queues.consumers]]
queue = "ming-image-processing-dlq-production"
max_batch_size = 1
max_batch_timeout = 5

[vars]
R2_ACCOUNT_ID = "fee0d037c4a95bd94c997ee2a8b520be"
RONCALPHOTO_ORIGINALS_BUCKET_NAME = "roncalphoto-originals"
RONCALPHOTO_MEDIA_BUCKET_NAME = "roncalphoto-media"
PROCESSING_QUEUE_NAME = "ming-image-processing-production"
PROCESSING_DLQ_NAME = "ming-image-processing-dlq-production"
